---
apiVersion: v1
kind: Namespace
metadata:
  name: html-app

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: html-app
  namespace: html-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: html-app
  template:
    metadata:
      labels:
        app: html-app
    spec:
      containers:
      - name: html-app
        image: jatinbhalla1991/samplehtml:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        # livenessProbe:
        #   httpGet:
        #     path: /
        #     port: 80
        #   initialDelaySeconds: 10
        #   periodSeconds: 10
        # readinessProbe:
        #   httpGet:
        #     path: /
        #     port: 80
        #   initialDelaySeconds: 5
        #   periodSeconds: 5

---
# LoadBalancer Service
apiVersion: v1
kind: Service
metadata:
  name: html-app-loadbalancer
  namespace: html-app
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: html-app

---
# ClusterIP Service (Internal)
apiVersion: v1
kind: Service
metadata:
  name: html-app-internal
  namespace: html-app
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: html-app
