---
# Namespace for HTML application
apiVersion: v1
kind: Namespace
metadata:
  name: html-app
  labels:
    name: html-app

---
# Deployment for HTML/Nginx application
apiVersion: apps/v1
kind: Deployment
metadata:
  name: html-app
  namespace: html-app
  labels:
    app: html-app
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: html-app
  template:
    metadata:
      labels:
        app: html-app
    spec:
      containers:
      - name: html-app
        image: html-app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        
        # Resource requests and limits
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        
        # Liveness probe
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        
        # Readiness probe
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 2

---
# LoadBalancer Service - External Access
apiVersion: v1
kind: Service
metadata:
  name: html-app-loadbalancer
  namespace: html-app
  labels:
    app: html-app
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  selector:
    app: html-app

---
# ClusterIP Service - Internal Access
apiVersion: v1
kind: Service
metadata:
  name: html-app-internal
  namespace: html-app
  labels:
    app: html-app
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  selector:
    app: html-app

---
# NodePort Service - Node Access
apiVersion: v1
kind: Service
metadata:
  name: html-app-nodeport
  namespace: html-app
  labels:
    app: html-app
spec:
  type: NodePort
  ports:
  - name: http
    port: 80
    targetPort: http
    nodePort: 30080
    protocol: TCP
  selector:
    app: html-app

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: html-app-hpa
  namespace: html-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: html-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
